<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS // SPATIAL DATABASE CLI</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * { 
            box-sizing: border-box; 
            font-family: 'Share Tech Mono', 'Courier New', Courier, monospace; 
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            display: flex; 
            background: #050202; 
        }

        /* Custom scrollbar for sidebar */
        #sidebar::-webkit-scrollbar {
            width: 8px;
        }
        #sidebar::-webkit-scrollbar-track {
            background: #0f0505;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: #551111;
            border-radius: 2px;
        }
        #sidebar::-webkit-scrollbar-thumb:hover {
            background: #990000;
        }

        #sidebar {
            width: 320px;
            flex-shrink: 0;
            background: #140505;
            color: #ff9999;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 2px solid #800000;
            box-shadow: 5px 0 15px rgba(255, 0, 0, 0.15);
            z-index: 10;
            overflow-y: auto;
        }
        #map-container {
            flex: 1;
            height: 100%;
            min-width: 0;
            position: relative;
            background: #050202;
        }
        #map { 
            width: 100%; 
            height: 100%; 
        }
        #map-loader {
            position: absolute;
            top: 20px;
            right: 80px;
            background: #140505;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 8px 16px;
            font-size: 0.9rem;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
            display: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .terminal-loader {
            color: #ff3333;
            text-align: center;
            padding: 40px 20px;
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
            letter-spacing: 1.2px;
            font-size: 0.95rem;
            text-transform: uppercase;
        }
        .terminal-loader::after {
            content: "/";
            display: inline-block;
            animation: rotateSpinner 0.8s infinite steps(4);
            margin-left: 8px;
        }
        @keyframes rotateSpinner {
            0% { content: "/"; }
            25% { content: "-"; }
            50% { content: "\\"; }
            75% { content: "|"; }
        }

        h2, h3 { 
            margin: 0; 
            color: #ff3333; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.4);
        }

        h2 { font-size: 1.5rem; border-bottom: 2px solid #800000; padding-bottom: 10px; }
        h3 { font-size: 1.1rem; margin-bottom: 15px; }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; color: #b36666; text-transform: uppercase; }
        
        input, button { 
            padding: 12px; 
            border-radius: 2px; 
            border: 1px solid #800000; 
            background: #240a0a;
            color: #ffb3b3;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
        }

        input:focus {
            outline: none;
            border-color: #ff3333;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
            background: #2e0d0d;
        }

        button { 
            background: #990000; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            border: 1px solid #ff3333;
            letter-spacing: 1px;
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
        }

        button:hover { 
            background: #ff3333; 
            box-shadow: 0 0 12px rgba(255, 51, 51, 0.8);
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.8);
        }

        .poi-item {
            background: #1c0606;
            padding: 12px;
            border-radius: 2px;
            margin-bottom: 10px;
            border: 1px solid #471414;
            border-left: 4px solid #ff3333;
            transition: all 0.2s ease;
        }

        .poi-item:hover {
            border-color: #ff3333;
            background: #2d0a0a;
            transform: translateX(3px);
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.3);
        }

        #map-loader::after {
            content: "/";
            display: inline-block;
            animation: rotateSpinner 0.8s infinite steps(4);
            margin-left: 8px;
        }

        #map-overflow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 5, 5, 0.9);
            border: 2px dashed #ff3333;
            color: #ff3333;
            padding: 20px 30px;
            font-size: 1.1rem;
            z-index: 1000;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.4);
            display: none;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(255, 51, 51, 0.3); border-color: #990000; }
            50% { box-shadow: 0 0 30px rgba(255, 51, 51, 0.6); border-color: #ff3333; }
            100% { box-shadow: 0 0 15px rgba(255, 51, 51, 0.3); border-color: #990000; }
        }

        /* Splash Screen Overlay */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #070202;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
            opacity: 1;
            visibility: visible;
        }

        #splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .globe-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 180px;
            height: 180px;
        }

        .globe-pulse {
            animation: pulseGlobe 2.5s ease-in-out infinite;
        }

        .retro-globe {
            width: 100%;
            height: 100%;
        }

        .globe-ring {
            fill: none;
            stroke: #ff3333;
            stroke-width: 0.75;
            stroke-opacity: 0.35;
            stroke-dasharray: 4 6;
            animation: spinRing 24s linear infinite;
            transform-origin: 100px 100px;
        }

        .globe-outline {
            fill: none;
            stroke: #ff3333;
            stroke-width: 2.2;
            stroke-opacity: 0.9;
        }

        .globe-grid {
            transform: rotate(-15deg);
            transform-origin: 100px 100px;
        }

        .globe-line {
            fill: none;
            stroke: #ff3333;
            stroke-width: 1;
            stroke-opacity: 0.45;
        }

        .globe-line.equator {
            stroke-width: 1.2;
            stroke-opacity: 0.6;
        }

        .longitude {
            transform-origin: 100px 100px;
            animation: spinLongitude 6s linear infinite;
        }

        .lon-1 { animation-delay: 0s; }
        .lon-2 { animation-delay: -1.5s; }
        .lon-3 { animation-delay: -3s; }
        .lon-4 { animation-delay: -4.5s; }

        .scan-line {
            stroke: #ff3333;
            stroke-width: 1.5;
            stroke-opacity: 0.85;
            transform-origin: 100px 100px;
            animation: scanGlobe 4s ease-in-out infinite;
        }

        .webgis-logo {
            margin-top: 10px;
        }

        .logo-text {
            fill: none;
            stroke: #ff3333;
            stroke-width: 1.5;
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: drawText 2.2s ease-in-out forwards;
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 8px;
            font-family: 'Share Tech Mono', Courier New, monospace;
        }

        #splash-logs {
            width: 350px;
            height: 110px;
            font-family: 'Share Tech Mono', monospace;
            color: #ff6666;
            font-size: 0.85rem;
            text-align: left;
            padding: 10px;
            border-left: 2px solid #800000;
            background: rgba(20, 5, 5, 0.4);
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-transform: uppercase;
        }

        .log-line {
            opacity: 0;
            animation: showLogLine 0.2s forwards;
            letter-spacing: 1px;
        }

        @keyframes spinRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spinLongitude {
            0% {
                transform: scaleX(1);
                stroke-opacity: 0.55;
            }
            25% {
                stroke-opacity: 0.25;
            }
            50% {
                transform: scaleX(-1);
                stroke-opacity: 0.55;
            }
            75% {
                stroke-opacity: 0.25;
            }
            100% {
                transform: scaleX(1);
                stroke-opacity: 0.55;
            }
        }

        @keyframes scanGlobe {
            0% { transform: translateY(-80px); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(80px); opacity: 0; }
        }

        @keyframes pulseGlobe {
            0% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(255, 51, 51, 0.4)); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 22px rgba(255, 51, 51, 0.7)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(255, 51, 51, 0.4)); }
        }

        @keyframes drawText {
            80% {
                stroke-dashoffset: 0;
                fill: rgba(255, 51, 51, 0);
                filter: drop-shadow(0 0 2px rgba(255, 51, 51, 0.5));
            }
            100% {
                stroke-dashoffset: 0;
                fill: rgba(255, 51, 51, 0.15);
                filter: drop-shadow(0 0 12px rgba(255, 51, 51, 0.8));
            }
        }

        @keyframes showLogLine {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="globe-container globe-pulse">
            <svg class="retro-globe" width="160" height="160" viewBox="0 0 200 200">
                <defs>
                    <clipPath id="globe-clip">
                        <circle cx="100" cy="100" r="80" />
                    </clipPath>
                </defs>
                <circle cx="100" cy="100" r="90" class="globe-ring" />
                <circle cx="100" cy="100" r="80" class="globe-outline" />
                <g class="globe-grid" transform="rotate(-15 100 100)">
                    <line x1="20" y1="100" x2="180" y2="100" class="globe-line equator" />
                    <ellipse cx="100" cy="70" rx="74" ry="14" class="globe-line latitude" />
                    <ellipse cx="100" cy="45" rx="55" ry="10" class="globe-line latitude" />
                    <ellipse cx="100" cy="130" rx="74" ry="14" class="globe-line latitude" />
                    <ellipse cx="100" cy="155" rx="55" ry="10" class="globe-line latitude" />
                    <ellipse cx="100" cy="100" rx="80" ry="80" class="globe-line longitude lon-1" />
                    <ellipse cx="100" cy="100" rx="80" ry="80" class="globe-line longitude lon-2" />
                    <ellipse cx="100" cy="100" rx="80" ry="80" class="globe-line longitude lon-3" />
                    <ellipse cx="100" cy="100" rx="80" ry="80" class="globe-line longitude lon-4" />
                </g>
                <line x1="0" y1="100" x2="200" y2="100" class="scan-line" clip-path="url(#globe-clip)" />
            </svg>
        </div>
        <svg class="webgis-logo" width="300" height="80" viewBox="0 0 300 80">
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="logo-text">WEBGIS</text>
        </svg>
        <div id="splash-logs"></div>
    </div>

    <div id="sidebar">
        <h2>Filter Properties</h2>
        <div class="filter-group">
            <label for="minPrice">Min Price ($)</label>
            <input type="text" id="minPrice" value="0">
        </div>
        <div class="filter-group">
            <label for="maxPrice">Max Price ($)</label>
            <input type="text" id="maxPrice" value="1,000,000">
        </div>
        <button id="applyFilters">Apply Filters</button>
        <hr style="width:100%; border-color:#455a64;">
        <div id="listings-summary">
            <h3>Visible Listings</h3>
            <div id="poi-list">Move the map to load items...</div>
        </div>
    </div>

    <div id="map-container">
        <div id="map-loader">[ SCANNING DATABASE ]</div>
        <div id="map-overflow">[ SYSTEM OVERFLOW: 2,000+ PROPERTIES FOUND. PLEASE ZOOM IN OR FILTER PRICE. ]</div>
        <div id="map"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        let map;
        let markers = [];
        let markerClustererInstance;
        let currentPois = [];
        let activePoiId = null;
        let activeInfoWindow = null;

        // Splash screen state and logs configuration
        let isMapReady = false;
        let isMinDelayPassed = false;
        const LOGS = [
            'System boot initiated...',
            'Connecting to spatial database...',
            'Establishing spatial R-tree index...',
            'Sydney viewport buffer loaded.',
            'Ready.'
        ];

        function startSplashLogs() {
            const logsContainer = document.getElementById('splash-logs');
            if (!logsContainer) return;
            let logIndex = 0;

            function addLog() {
                if (logIndex >= LOGS.length) return;
                const line = document.createElement('div');
                line.className = 'log-line';
                line.innerHTML = `> ${LOGS[logIndex]}`;
                logsContainer.appendChild(line);
                logIndex++;
                setTimeout(addLog, 450);
            }

            setTimeout(addLog, 200);
        }

        function dismissSplashScreen() {
            if (isMapReady && isMinDelayPassed) {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.classList.add('fade-out');
                    setTimeout(() => splash.remove(), 800); // Clean up DOM after fade
                }
            }
        }

        // Dark red cyberpunk map styling
        const mapStyle = [
            { elementType: "geometry", stylers: [{ color: "#110404" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#110404" }, { weight: 2 }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#993333" }] },
            { featureType: "administrative", elementType: "geometry", stylers: [{ color: "#441111" }] },
            { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#1a0808" }] },
            { featureType: "poi", elementType: "geometry", stylers: [{ color: "#1a0808" }] },
            { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#993333" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#2d0d0d" }] },
            { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#804040" }] },
            { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#4a1212" }] },
            { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#661111" }] },
            { featureType: "transit", elementType: "geometry", stylers: [{ color: "#220808" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#050101" }] }
        ];

        // Glowing red circular SVG marker
        const svgIcon = `
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
            <defs>
                <radialGradient id="rg" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
                    <stop offset="0%" style="stop-color:#990000;stop-opacity:1" />
                    <stop offset="70%" style="stop-color:#3d0000;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff1a1a;stop-opacity:1" />
                </radialGradient>
                <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComponentTransfer in="blur" result="brightBlur">
                        <feFuncA type="linear" slope="1.5"/>
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode in="brightBlur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
            <circle cx="24" cy="24" r="18" fill="url(#rg)" stroke="#ff3333" stroke-width="2" filter="url(#glow)" />
        </svg>
        `;

        function setupMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: -33.8688, lng: 151.2093 },
                zoom: 11,
                mapTypeId: 'roadmap'
            });

            map.addListener('idle', fetchPOIs);
            document.getElementById('applyFilters').addEventListener('click', fetchPOIs);
        }

        function showError(message) {
            document.getElementById('poi-list').innerHTML =
                `<p style="color:#e74c3c;">${message}</p>`;
        }

        async function loadGoogleMaps() {
            try {
                const response = await fetch(`${API_BASE}/api/config`);
                const config = await response.json();

                if (!response.ok) {
                    showError(config.error || 'Failed to load map configuration.');
                    return;
                }

                await new Promise((resolve, reject) => {
                    const clusterScript = document.createElement('script');
                    clusterScript.src = 'https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js';
                    clusterScript.onload = () => {
                        window.initMap = () => {
                            setupMap();
                            isMapReady = true;
                            dismissSplashScreen();
                            resolve();
                        };

                        const script = document.createElement('script');
                        script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(config.googleMapsApiKey)}&callback=initMap`;
                        script.async = true;
                        script.defer = true;
                        script.onerror = () => reject(new Error('Failed to load Google Maps script'));
                        document.head.appendChild(script);
                    };
                    clusterScript.onerror = () => reject(new Error('Failed to load MarkerClusterer script'));
                    document.head.appendChild(clusterScript);
                });
            } catch (err) {
                console.error('Error loading Google Maps:', err);
                showError('Could not load the map. Is the backend running with GOOGLE_MAPS_API_KEY set?');
            }
        }

        loadGoogleMaps();

        // Initialize splash screen sequence
        startSplashLogs();
        setTimeout(() => {
            isMinDelayPassed = true;
            dismissSplashScreen();
        }, 2800);

        async function fetchPOIs() {
            if (!map) return;

            const bounds = map.getBounds();
            if (!bounds) return;

            const ne = bounds.getNorthEast();
            const sw = bounds.getSouthWest();
            // Strip commas from inputs for backend query
            const minPrice = document.getElementById('minPrice').value.replace(/,/g, '');
            const maxPrice = document.getElementById('maxPrice').value.replace(/,/g, '');

            const url = `${API_BASE}/api/pois?` +
                        `west=${sw.lng()}&east=${ne.lng()}&south=${sw.lat()}&north=${ne.lat()}` +
                        `&minPrice=${minPrice}&maxPrice=${maxPrice}`;

            // Show terminal scanning indicators
            document.getElementById('map-loader').style.display = 'block';
            document.getElementById('poi-list').innerHTML = '<div class="terminal-loader">SCANNING GEOGRAPHIC VIEWPORT</div>';

            try {
                const response = await fetch(url);
                const data = await response.json();
                currentPois = data.results || [];

                if (data.exceeded) {
                    document.getElementById('map-overflow').style.display = 'block';
                    updateMapMarkers([]);
                    updateSidebarList(data);
                } else {
                    document.getElementById('map-overflow').style.display = 'none';
                    updateMapMarkers(currentPois);
                    updateSidebarList(data);
                }
            } catch (err) {
                console.error('Error updating WebGIS data layer:', err);
                showError('SCAN ERROR: Failed to query spatial database.');
            } finally {
                document.getElementById('map-loader').style.display = 'none';
            }
        }

        // Custom cluster renderer matching the retro red theme
        const clusterRenderer = {
            render: ({ count, position }) => {
                let size = 42;
                if (count > 50) size = 50;
                if (count > 250) size = 58;
                
                const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
                    <defs>
                        <radialGradient id="crg_${count}" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#b30000;stop-opacity:0.9" />
                            <stop offset="70%" style="stop-color:#3d0000;stop-opacity:0.95" />
                            <stop offset="100%" style="stop-color:#ff1a1a;stop-opacity:1" />
                        </radialGradient>
                        <filter id="cglow_${count}" x="-30%" y="-30%" width="160%" height="160%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feMerge>
                                <feMergeNode in="blur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <circle cx="${size/2}" cy="${size/2}" r="${size/2 - 4}" fill="url(#crg_${count})" stroke="#ff3333" stroke-width="2.5" filter="url(#cglow_${count})" />
                </svg>
                `;

                return new google.maps.Marker({
                    position,
                    icon: {
                        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
                        scaledSize: new google.maps.Size(size, size),
                        anchor: new google.maps.Point(size / 2, size / 2),
                        labelOrigin: new google.maps.Point(size / 2, size / 2)
                    },
                    label: {
                        text: String(count),
                        color: '#ffffff',
                        fontSize: '11px',
                        fontWeight: 'bold',
                        fontFamily: '"Share Tech Mono", Courier New, monospace'
                    },
                    zIndex: google.maps.Marker.MAX_ZINDEX + 1
                });
            }
        };

        function showPoiDetails(poiId, marker) {
            activePoiId = poiId;
            
            if (activeInfoWindow) {
                activeInfoWindow.close();
            }
            
            const poi = currentPois.find(p => p.id === poiId);
            if (!poi) return;

            const infoWindow = new google.maps.InfoWindow({
                content: `
                <div style="background: #140505; color: #ff9999; border: 1px solid #ff3333; padding: 10px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; border-radius: 2px; box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);">
                    <strong style="color: #ff3333; font-size: 1rem; border-bottom: 1px solid #800000; display: block; margin-bottom: 5px; padding-bottom: 2px;">${poi.name}</strong>
                    <div style="margin-bottom: 2px;">Price: <span style="color: #ffffff;">$${poi.price.toLocaleString()}</span></div>
                    <div>Type: <span style="color: #ffffff; text-transform: uppercase;">${poi.property_type}</span></div>
                </div>
                `
            });

            infoWindow.open(map, marker);
            activeInfoWindow = infoWindow;

            // Clear active POI when user manually closes the InfoWindow
            infoWindow.addListener('closeclick', () => {
                if (activePoiId === poiId) {
                    activePoiId = null;
                }
            });
        }

        function updateMapMarkers(pois) {
            markers.forEach(marker => marker.setMap(null));
            markers = [];

            if (markerClustererInstance) {
                markerClustererInstance.clearMarkers();
            }

            const markerIcon = {
                url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svgIcon),
                scaledSize: new google.maps.Size(42, 42),
                anchor: new google.maps.Point(21, 21),
                labelOrigin: new google.maps.Point(21, 21)
            };

            let activeMarkerToOpen = null;

            pois.forEach(poi => {
                const marker = new google.maps.Marker({
                    position: { lat: Number(poi.lat), lng: Number(poi.lng) },
                    icon: markerIcon,
                    title: poi.name,
                    poiId: poi.id,
                    label: {
                        text: `$${(poi.price / 1000).toFixed(0)}k`,
                        color: '#ffffff',
                        fontSize: '10px',
                        fontWeight: 'bold',
                        fontFamily: '"Share Tech Mono", Courier New, monospace'
                    }
                });

                marker.addListener('click', () => {
                    showPoiDetails(poi.id, marker);
                });

                markers.push(marker);

                if (activePoiId === poi.id) {
                    activeMarkerToOpen = marker;
                }
            });

            // Initialize or update marker clusterer
            if (typeof markerClusterer !== 'undefined') {
                if (!markerClustererInstance) {
                    markerClustererInstance = new markerClusterer.MarkerClusterer({
                        map: map,
                        markers: markers,
                        renderer: clusterRenderer
                    });
                } else {
                    markerClustererInstance.addMarkers(markers);
                }
            }

            // Re-open details after markers are drawn and added to map/clusterer
            if (activeMarkerToOpen) {
                setTimeout(() => {
                    showPoiDetails(activePoiId, activeMarkerToOpen);
                }, 10);
            }
        }

        function updateSidebarList(data) {
            const listContainer = document.getElementById('poi-list');
            listContainer.innerHTML = '';

            const pois = data.results || [];
            const total = data.total || 0;
            const limit = data.limit || 500;

            const summaryHeader = document.querySelector('#listings-summary h3');
            if (summaryHeader) {
                if (data.exceeded) {
                    summaryHeader.innerHTML = `Visible Listings <span style="font-size: 0.8rem; color: #ff3333;">(OVERFLOW)</span>`;
                } else if (total > limit) {
                    summaryHeader.innerHTML = `Visible Listings <span style="font-size: 0.8rem; color: #f1c40f;">(Showing ${limit} of ${total.toLocaleString()})</span>`;
                } else {
                    summaryHeader.innerHTML = `Visible Listings <span style="font-size: 0.8rem; color: #2ecc71;">(${total.toLocaleString()} found)</span>`;
                }
            }

            if (data.exceeded) {
                listContainer.innerHTML = `
                    <div style="color: #ff3333; border: 1px dashed #800000; padding: 15px; background: #1f0808; text-align: center; text-transform: uppercase; line-height: 1.4;">
                        [ SYSTEM OVERFLOW ]<br>
                        2,000+ matches found.<br>
                        Zoom in or filter by price to scan listings.
                    </div>
                `;
                return;
            }

            if (pois.length === 0) {
                listContainer.innerHTML = '<p style="color:#bdc3c7;">No properties in this view window.</p>';
                return;
            }

            pois.forEach(poi => {
                const item = document.createElement('div');
                item.className = 'poi-item';
                item.style.cursor = 'pointer';
                item.innerHTML = `<strong>${poi.name}</strong><br>$${poi.price.toLocaleString()} (${poi.property_type})`;
                
                item.addEventListener('click', () => {
                    const marker = markers.find(m => m.poiId === poi.id);
                    if (marker) {
                        map.panTo(marker.getPosition());
                        showPoiDetails(poi.id, marker);
                    }
                });

                listContainer.appendChild(item);
            });
        }

        // Setup comma-separated dynamic number formatting on input
        function formatNumberInput(e) {
            const input = e.target;
            let val = input.value.replace(/[^0-9]/g, '');
            if (val === '') {
                input.value = '';
                return;
            }
            input.value = Number(val).toLocaleString();
        }

        document.getElementById('minPrice').addEventListener('input', formatNumberInput);
        document.getElementById('maxPrice').addEventListener('input', formatNumberInput);
    </script>
</body>
</html>
